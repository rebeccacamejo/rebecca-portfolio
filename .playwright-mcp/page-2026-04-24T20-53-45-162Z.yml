        - heading "on justice" [level=1] [ref=e18]
        - paragraph [ref=e19]: a prayer about God's justice
      - generic [ref=e20]:
        - paragraph [ref=e21]: Have you ever heard someone say, “God isn’t just”?
        - paragraph [ref=e22]: Or maybe, deep down, you’ve wondered yourself—How can God be good when there’s so much brokenness in the world? So much brokenness in me?
        - paragraph [ref=e23]: "And yet, the mystery of the gospel is this: God is just. He doesn’t overlook sin. He doesn’t shrug off evil. But He is also immeasurably merciful."
        - paragraph [ref=e24]: Romans 3:24 tells us that we are justified freely by His grace through the redemption that came by Christ Jesus.
        - paragraph [ref=e25]: That means justice wasn’t abandoned. It was satisfied—fully—in Jesus. And mercy wasn’t delayed. It was poured out in blood—freely—on us.
        - paragraph [ref=e26]: It should be our greatest honor to know this Jesus—the Word made flesh, who came to reveal the Father, and dwelled among us. I am honored and grateful to do this alongside you—a community of people being formed by grace, a family being pursued by God himself.
        - paragraph [ref=e27]: So as we pray, let’s come honestly. Let’s come humbly. And let’s come with hearts ready to be changed.
        - paragraph [ref=e28]: Let’s pray.
        - paragraph [ref=e29]: Heavenly Father,
        - paragraph [ref=e30]: We gather tonight in awe and wonder. You laid the foundations of the earth and stretched out the heavens. You set boundaries for the seas and command the stars by name. Time itself bows to You. A thousand years are like a day in Your sight.
        - paragraph [ref=e31]: Who among us can comprehend your holiness?
        - paragraph [ref=e32]: And yet, You draw near. You are Immanuel, God with us.
        - paragraph [ref=e33]: We come not just to sing songs, but to encounter You—the living, sovereign God. Not just to speak, but to listen. Not just to be stirred, but to be changed.
        - paragraph [ref=e34]: Our eyes are not on our woundedness anymore God. Our eyes are not on the world or the desires of our heart. Our eyes are on Jesus—the One who gave Himself for us, who bore our shame, carried our sorrows, and rose in victory.
        - paragraph [ref=e35]: "Your Word declares: “All are justified freely by His grace through the redemption that came by Christ Jesus” (Romans 3:24)."
        - paragraph [ref=e36]: You are just. You are merciful. You do not overlook sin, but You have made a way through the cross.
        - paragraph [ref=e37]: So tonight, Lord—we don’t pretend. We don’t perform. We repent.
        - paragraph [ref=e38]: "We confess like those in Jeremiah’s day: We’ve forsaken the spring of living water. We’ve dug broken cisterns that cannot hold what our souls crave. We’ve chased after idols—success, comfort, control."
        - paragraph [ref=e39]: We’ve scrolled and strived, but not sat still in Your presence. We’ve trusted in ourselves, and we’ve drifted from You.
        - paragraph [ref=e40]: "And yet—You are not done with us. You still say: “Return to Me, for I am your husband… I will choose you and bring you to Zion.”"
        - paragraph [ref=e41]: Even when we wander, You pursue. Even in our unfaithfulness, You call us “Beloved.” Even in judgment, Your heart burns with mercy.
        - paragraph [ref=e42]: Lord, we come not with our goodness, but with our need. We cry out like the woman who touched Jesus’ robe—desperate for healing, desperate for hope.
        - paragraph [ref=e43]: And by faith, we believe Your arms are open wide.
        - paragraph [ref=e44]: Because your word shows us that you don’t just wait for repentance—you empower it. You said, “I will give them a heart to know me, that I am the Lord their God.” You pour out mercy that restores.
        - paragraph [ref=e45]: You anointed Your Servant to “bind up the brokenhearted…to proclaim liberty to the captives… to comfort all who mourn” (Isaiah 61).
        - paragraph [ref=e46]: Thank You, Jesus.
        - paragraph [ref=e47]: In You, justice and mercy meet. Our sin is not ignored—it is paid for. We are not just forgiven—we are made new.
        - paragraph [ref=e48]: Clothed in righteousness. Sealed with Your Spirit. Written into a new covenant—one of grace, not law.
        - paragraph [ref=e49]: "You said through Jeremiah: “I will never stop doing good to them… I will rejoice in doing them good…with all My heart and soul” (Jer. 32:40–41)."
        - paragraph [ref=e50]: What kind of God rejoices over His people like this? Who delights in restoring what sin has broken? Only You.
        - paragraph [ref=e51]: You are the Righteous Branch from David’s line. You are the Hope of every weary heart. You are not just the way to God—you are God, coming for us.
        - paragraph [ref=e52]: So we thank You, not just for cancelling our debt, but for writing a new story. Not just for sparing us, but for calling us sons and daughters.
        - paragraph [ref=e53]: Let us feel the weight of the cross—and the wonder of grace.
        - paragraph [ref=e54]: Señor, tu nombre es nuestro Refugio. Pertenecemos a ti. Que no seamos aplastados por nuestra culpa, sino transformados por tu fidelidad.
        - paragraph [ref=e55]: Restáuranos, Dios a través de tu misericordia. Escudriñados Padre. Purifícanos. Haznos un pueblo humilde y rendido.
        - paragraph [ref=e56]: Danos la fuerza para caminar en arrepentimiento, no solo esta noche, sino cada día. Trátanos conforme a tu amor inagotable.
        - paragraph [ref=e57]: Que Tu Palabra sea nuestra guía y Tu Espíritu nuestro ayudador.
        - paragraph [ref=e58]: "Que esta noche marquemos un regreso a nuestro primer amor. Que no sean prácticas religiosas, pero que podemos regresar a relación. Que digamos de nuevo:"
        - paragraph [ref=e59]: Jesús, eres todo lo que queremos. Jesús, eres todo lo que necesitamos.
        - paragraph [ref=e60]: Creemos en Tu misericordia. Confiamos en la obra consumada de Tu Hijo. No te pedimos escapar de la disciplina, sino encontrarte en medio de ella.
        - paragraph [ref=e61]: Todo lo que soy te lo entrego hoy. Te amo más que a mi vida. Invocó tu nombre en la oscuridad y me dijiste “eres mía”
        - paragraph [ref=e62]: Tú eres nuestra esperanza—no nuestras promesas, no nuestro desempeño—Tu corazón. Hoy perfumamos tu trono. Y levantamos nuestros ojos a Jesús, el autor y consumador de nuestra fe.
        - paragraph [ref=e63]: En su nombre oramos, Amen.
